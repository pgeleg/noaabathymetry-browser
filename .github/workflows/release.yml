name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS
            artifact: noaabathymetry-macOS
            exe_name: noaabathymetry
          - os: windows-latest
            name: Windows
            artifact: noaabathymetry-Windows.exe
            exe_name: noaabathymetry.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          channels: conda-forge
          activate-environment: build
          miniforge-version: latest

      - name: Install dependencies
        run: |
          conda install -y gdal
          pip install aiohttp
          pip install git+https://github.com/noaa-ocs-hydrography/BlueTopo.git@dev
          pip install pyinstaller
          pip install -e .

      - name: Generate Windows icon
        if: runner.os == 'Windows'
        run: |
          pip install pillow
          python -c "from PIL import Image; img=Image.open('assets/NOAA-1.png'); img.save('assets/NOAA.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build with PyInstaller
        run: pyinstaller nbs_browser.spec

      - name: Rename macOS executable
        if: runner.os == 'macOS'
        run: mv "dist/${{ matrix.exe_name }}" "dist/${{ matrix.artifact }}"

      - name: Rename Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item "dist\${{ matrix.exe_name }}" "dist\${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
