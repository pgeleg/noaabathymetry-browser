name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            name: macOS-Intel
          - os: macos-latest
            name: macOS-ARM
          - os: windows-latest
            name: Windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3
        with:
          python-version: "3.12"
          channels: conda-forge
          activate-environment: build
          miniforge-version: latest

      - name: Install dependencies
        # TODO: Pin BlueTopo to release tag when dev features are released
        # TODO: Add dependency lockfile for full reproducibility
        run: |
          conda install -y gdal
          pip install aiohttp==3.13.5 certifi==2026.2.25 pyinstaller==6.19.0
          pip install git+https://github.com/noaa-ocs-hydrography/BlueTopo.git@dev
          pip install -e .

      - name: Generate Windows icon
        if: runner.os == 'Windows'
        run: |
          pip install pillow==12.2.0
          python -c "from PIL import Image; img=Image.open('assets/NOAA-2.png'); img.save('assets/NOAA.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          mkdir -p assets/NOAA.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/NOAA-2.png --out assets/NOAA.iconset/icon_${size}x${size}.png 2>/dev/null
          done
          cp assets/NOAA.iconset/icon_32x32.png assets/NOAA.iconset/icon_16x16@2x.png
          cp assets/NOAA.iconset/icon_64x64.png assets/NOAA.iconset/icon_32x32@2x.png
          cp assets/NOAA.iconset/icon_256x256.png assets/NOAA.iconset/icon_128x128@2x.png
          cp assets/NOAA.iconset/icon_512x512.png assets/NOAA.iconset/icon_256x256@2x.png
          iconutil -c icns assets/NOAA.iconset
          rm -rf assets/NOAA.iconset

      - name: Build with PyInstaller
        run: pyinstaller nbs_browser.spec

      - name: Compute checksums
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            cd dist && zip -r -y -q "../noaabathymetry-${{ matrix.name }}.zip" "noaabathymetry.app"
            cd .. && shasum -a 256 "noaabathymetry-${{ matrix.name }}.zip" > "noaabathymetry-${{ matrix.name }}.zip.sha256"
          else
            shasum -a 256 "dist/noaabathymetry.exe" > "noaabathymetry.exe.sha256"
          fi

      - name: Upload macOS
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: noaabathymetry-${{ matrix.name }}
          path: |
            noaabathymetry-${{ matrix.name }}.zip
            noaabathymetry-${{ matrix.name }}.zip.sha256

      - name: Upload Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: noaabathymetry-Windows
          path: |
            dist/noaabathymetry.exe
            noaabathymetry.exe.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    # TODO: Sign releases with GPG or GitHub attestation

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            artifacts/noaabathymetry-macOS-Intel/noaabathymetry-macOS-Intel.zip
            artifacts/noaabathymetry-macOS-Intel/noaabathymetry-macOS-Intel.zip.sha256
            artifacts/noaabathymetry-macOS-ARM/noaabathymetry-macOS-ARM.zip
            artifacts/noaabathymetry-macOS-ARM/noaabathymetry-macOS-ARM.zip.sha256
            artifacts/noaabathymetry-Windows/noaabathymetry.exe
            artifacts/noaabathymetry-Windows/noaabathymetry.exe.sha256
          generate_release_notes: true
